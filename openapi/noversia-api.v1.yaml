openapi: 3.1.0
info:
  title: Noversia API
  version: 0.8.0
servers:
  - url: http://localhost:8080/api/v1
paths:
  /health:
    get:
      summary: Health check API
      responses:
        "200": { description: OK }
  /categories:
    get:
      summary: Liste les catégories
      responses:
        "200": { description: Liste des catégories }
  /categorization-rules:
    get:
      summary: Liste les règles de catégorisation
      responses:
        "200": { description: Liste des règles }
    post:
      summary: Crée une règle de catégorisation
      responses:
        "201": { description: Règle créée }
  /rule-suggestions:
    get:
      summary: Liste les suggestions de règles
      responses:
        "200": { description: Suggestions }
  /transactions:
    get:
      summary: Liste les transactions
      responses:
        "200": { description: Liste des transactions }
  /transactions/{id}/category:
    patch:
      summary: Corrige manuellement la catégorie d'une transaction
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200": { description: Transaction mise à jour }
  /transactions/import:
    post:
      summary: Importe, catégorise et persiste un CSV bancaire
      responses:
        "202": { description: Rapport d'import }
