openapi: 3.1.0
info:
  title: Noversia API
  version: 0.7.0
servers:
  - url: http://localhost:8080/api/v1
paths:
  /health:
    get:
      summary: Health check API
      responses:
        "200": { description: OK }
  /categories:
    get:
      summary: Liste les catégories
      responses:
        "200": { description: Liste des catégories }
  /categorization-rules:
    get:
      summary: Liste les règles de catégorisation
      responses:
        "200": { description: Liste des règles }
    post:
      summary: Crée une règle de catégorisation
      responses:
        "201": { description: Règle créée }
  /transactions:
    get:
      summary: Liste les transactions persistées
      responses:
        "200": { description: Liste des transactions }
  /transactions/import:
    post:
      summary: Importe, catégorise et persiste un fichier CSV bancaire
      responses:
        "202": { description: Rapport d'import }
  /imports/{id}:
    get:
      summary: Consulte un rapport d'import
      responses:
        "200": { description: Rapport d'import }
