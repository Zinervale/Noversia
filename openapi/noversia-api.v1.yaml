openapi: 3.1.0
info:
  title: Noversia API
  version: 0.9.0
servers:
  - url: http://localhost:8080/api/v1
paths:
  /health:
    get:
      summary: Health check API
      responses:
        "200": { description: OK }
  /rule-suggestions:
    get:
      summary: Liste les suggestions de règles
      responses:
        "200": { description: Suggestions }
  /rule-suggestions/apply:
    post:
      summary: Transforme une suggestion en règle active
      responses:
        "201": { description: Règle créée }
  /transactions:
    get:
      summary: Liste les transactions
      responses:
        "200": { description: Liste des transactions }
  /transactions/import:
    post:
      summary: Importe, catégorise, détecte les marchands et persiste un CSV
      responses:
        "202": { description: Rapport d'import }
