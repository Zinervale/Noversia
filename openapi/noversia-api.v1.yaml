openapi: 3.1.0
info:
  title: Noversia API
  version: 0.3.0
servers:
  - url: http://localhost:8080/api/v1
paths:
  /health:
    get:
      summary: Health check API
      responses:
        "200":
          description: OK
  /accounts:
    get:
      summary: Liste les comptes
      responses:
        "200":
          description: Liste des comptes
    post:
      summary: Crée un compte manuel
      responses:
        "201":
          description: Compte créé
  /transactions:
    get:
      summary: Liste les transactions
      responses:
        "200":
          description: Liste des transactions
  /transactions/import:
    post:
      summary: Importe un fichier CSV bancaire
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "202":
          description: Import accepté
  /recommendations:
    get:
      summary: Liste les recommandations
      responses:
        "200":
          description: Liste des recommandations
  /chat:
    post:
      summary: Envoie une question au service IA
      responses:
        "200":
          description: Réponse IA
