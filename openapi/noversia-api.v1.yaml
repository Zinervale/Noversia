openapi: 3.1.0
info:
  title: Noversia API
  version: 0.6.0
servers:
  - url: http://localhost:8080/api/v1
paths:
  /health:
    get:
      summary: Health check API
      responses:
        "200": { description: OK }
  /accounts:
    get:
      summary: Liste les comptes
      responses:
        "200": { description: Liste des comptes }
  /transactions:
    get:
      summary: Liste les transactions persistées
      responses:
        "200": { description: Liste des transactions }
  /transactions/import:
    post:
      summary: Importe, valide et persiste un fichier CSV bancaire
      responses:
        "202": { description: Rapport d'import }
  /imports/{id}:
    get:
      summary: Consulte un rapport d'import
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200": { description: Rapport d'import }
